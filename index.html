<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flag Play Studio</title>
    <link rel="stylesheet" href="styles.css?v=20260506-drawredo1">
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <header class="brand">
          <div>
            <p class="eyebrow">Flag Football 5 vs 5</p>
            <h1>Flag Play Studio</h1>
          </div>
          <button id="newPlayBtn" class="icon-button" type="button" title="New Play">+</button>
        </header>

        <section class="panel playbook-panel">
          <div class="panel-title">Playbook</div>
          <div class="action-row">
            <button id="newFolderBtn" class="wide-button" type="button">+ Folder</button>
            <button id="newPlayInFolderBtn" class="wide-button" type="button">+ Play</button>
          </div>
          <div id="playbookTree" class="playbook-tree" role="tree" aria-label="Playbook"></div>
        </section>

        <section class="panel playset-panel">
          <div class="panel-title">Playset File</div>
          <div id="playsetFileName" class="file-badge">Save Location: Not Selected</div>
          <div id="playsetFileHint" class="file-hint">Open JSON or save with a name to enable overwrite save.</div>
          <input id="playsetFileInput" class="visually-hidden" type="file" accept=".json,application/json">
          <div class="action-row">
            <button id="openPlaysetBtn" class="wide-button" type="button">Open JSON</button>
            <button id="savePlaysetFileBtn" class="wide-button primary" type="button">Overwrite Save</button>
          </div>
          <button id="savePlaysetAsBtn" class="wide-button" type="button">Save As</button>
        </section>

        <section class="panel formation-panel">
          <div class="panel-title">Offense Formation</div>
          <div class="formation-grid" aria-label="Offense formations">
            <button class="formation-button" type="button" data-formation="singleBack">Single back</button>
            <button class="formation-button" type="button" data-formation="spread">Spread</button>
            <button class="formation-button" type="button" data-formation="twins">Twins</button>
            <button class="formation-button" type="button" data-formation="twinsStack">Twins stack</button>
            <button class="formation-button" type="button" data-formation="trips">Trips</button>
            <button class="formation-button" type="button" data-formation="bunch">Bunch</button>
            <button class="formation-button" type="button" data-formation="tight">Tight</button>
            <button class="formation-button" type="button" data-formation="doubleBack">Double back</button>
            <button class="formation-button" type="button" data-formation="iFormation">I formation</button>
          </div>
          <div class="action-row formation-actions">
            <button class="wide-button" type="button" data-action="flip-play">Flip H</button>
          </div>
        </section>

        <section class="panel defense-formation-panel">
          <div class="panel-title">Defense Formation</div>
          <div class="formation-grid" aria-label="Defense formations">
            <button class="formation-button" type="button" data-defense-formation="normal">Normal</button>
            <button class="formation-button" type="button" data-defense-formation="man0">Man 0</button>
            <button class="formation-button" type="button" data-defense-formation="oneDeep">1 Deep</button>
            <button class="formation-button" type="button" data-defense-formation="cover2">Cover 2</button>
            <button class="formation-button" type="button" data-defense-formation="cover3">Cover 3</button>
            <button class="formation-button" type="button" data-defense-formation="boxZone">Box Zone</button>
            <button class="formation-button" type="button" data-defense-formation="goalLine">Goal Line</button>
            <button class="formation-button" type="button" data-defense-formation="prevent">Prevent</button>
          </div>
          <div class="action-row formation-actions">
            <button class="wide-button" type="button" data-action="toggle-defense-visible">Hide D</button>
          </div>
        </section>

        <section class="panel drawing-tools-panel">
          <div class="panel-title">Tools</div>
          <div class="segmented" role="group" aria-label="Tools">
            <button class="tool-button is-active" type="button" data-tool="select" title="Select"><span class="tool-icon">↖</span><span>Select</span></button>
            <button class="tool-button" type="button" data-tool="route" title="Route"><span class="tool-icon">➜</span><span>Route</span></button>
            <button class="tool-button" type="button" data-tool="draw" title="Draw"><span class="tool-icon">✎</span><span>Draw</span></button>
            <button class="tool-button" type="button" data-tool="motion" title="Motion"><span class="tool-icon">〰</span><span>Motion</span></button>
            <button class="tool-button" type="button" data-tool="pass" title="Pass"><span class="tool-icon">⋯</span><span>Pass</span></button>
            <button class="tool-button" type="button" data-tool="block" title="Block"><span class="tool-icon">⊣</span><span>Block</span></button>
            <button class="tool-button" type="button" data-tool="text" title="Comment"><span class="tool-icon">T</span><span>Comment</span></button>
          </div>

          <div class="control-grid">
            <label>
              <span>End Cap</span>
              <select id="endCap">
                <option value="arrow">Arrow</option>
                <option value="t">T</option>
                <option value="dot">Dot</option>
              </select>
            </label>
            <label>
              <span>Shape</span>
              <select id="routeShape">
                <option value="straight">Straight</option>
                <option value="curve">Curve</option>
                <option value="draw">Drawn</option>
              </select>
            </label>
          </div>
          <div class="preset-grid" id="routePresets" aria-label="Route presets">
            <button class="preset-button" type="button" data-preset="go">Go</button>
            <button class="preset-button" type="button" data-preset="out">Out</button>
            <button class="preset-button" type="button" data-preset="in">In</button>
            <button class="preset-button" type="button" data-preset="slant">Slant</button>
            <button class="preset-button" type="button" data-preset="post">Post</button>
            <button class="preset-button" type="button" data-preset="corner">Corner</button>
            <button class="preset-button" type="button" data-preset="curl">Curl</button>
            <button class="preset-button" type="button" data-preset="motion">Motion</button>
            <button class="preset-button" type="button" data-preset="block">Block</button>
          </div>
          <div class="action-row tool-actions">
            <button class="wide-button" type="button" data-action="finish-route" disabled>Done</button>
            <button class="wide-button danger" type="button" data-action="delete-selected" disabled>Delete</button>
          </div>
          <div class="action-row tool-actions">
            <button class="wide-button danger" type="button" data-action="clear-routes" disabled>Clear Lines</button>
            <button class="wide-button" type="button" data-action="toggle-fullscreen">Fullscreen</button>
          </div>
          <label class="check-row">
            <input id="snapToggle" type="checkbox">
            <span>Snap</span>
          </label>
          <label class="check-row">
            <input id="defenseToggle" type="checkbox" checked>
            <span>Defense</span>
          </label>
          <label class="range-row" for="playerSize">
            <span>Player Size</span>
            <input id="playerSize" type="range" min="5" max="35" step="1" value="25">
            <output id="playerSizeValue" for="playerSize">25</output>
          </label>
          <label class="range-row" for="endCapSize">
            <span>End Cap Size</span>
            <input id="endCapSize" type="range" min="0.5" max="2" step="0.1" value="0.5">
            <output id="endCapSizeValue" for="endCapSize">0.5</output>
          </label>
          <label class="color-row" for="lineColor">
            <span>Line Color</span>
            <input id="lineColor" type="color" value="#101010">
          </label>
          <label class="range-row" for="lineWidth">
            <span>Line Width</span>
            <input id="lineWidth" type="range" min="2" max="16" step="1" value="5">
            <output id="lineWidthValue" for="lineWidth">5</output>
          </label>
          <label class="range-row" for="lineOpacity">
            <span>Opacity</span>
            <input id="lineOpacity" type="range" min="0.2" max="1" step="0.05" value="1">
            <output id="lineOpacityValue" for="lineOpacity">1.00</output>
          </label>
        </section>

        <section class="panel selection-panel">
          <div class="panel-title">Selection</div>
          <div id="selectionBadge" class="selection-badge">Not Selected</div>
          <label class="field-label" for="selectedText">Comment</label>
          <textarea id="selectedText" class="text-area" rows="3" placeholder="Select a comment" disabled></textarea>
        </section>

        <section class="panel notes-panel">
          <div class="panel-title">Play Notes</div>
          <div id="bookNoteLabel" class="book-note-label">
            <div class="book-note-item"><span class="book-note-title">Book</span>: <span id="bookNoteName">My Play Book</span></div>
            <div class="book-note-item"><span class="book-note-title">Play</span>: <span id="playNoteName">New Play</span></div>
          </div>
          <textarea id="playNotes" class="text-area" rows="3" placeholder="Notes"></textarea>
        </section>

        <section class="panel marks-panel marks">
          <div class="panel-title">Marks</div>
          <div id="markList" class="mark-list"></div>
        </section>

        <section class="panel export-panel">
          <div class="action-row">
            <button id="deleteBtn" class="wide-button danger" type="button">Delete</button>
            <button id="exportPngBtn" class="wide-button" type="button">PNG</button>
          </div>
          <div class="action-row">
            <button id="pdfCurrentBtn" class="wide-button primary" type="button">PDF Play</button>
            <button id="pdfBookBtn" class="wide-button primary" type="button">PDF Book</button>
          </div>
        </section>
      </aside>

      <section class="workspace">
        <div class="topbar">
          <div class="title-group">
            <div id="folderLabel" class="folder-label editable-title" role="button" tabindex="0" data-action="rename-active-folder" title="Rename playbook">My Play Book</div>
            <h2 id="titleLabel" class="editable-title" role="button" tabindex="0" data-action="rename-active-play" title="Rename play">New Play</h2>
          </div>
          <div class="topbar-actions">
            <button id="savePhotoBtn" class="topbar-button" type="button" title="Save photo">Photo</button>
            <div id="statusText" class="status" role="status" aria-live="polite">Ready</div>
          </div>
        </div>

        <div class="canvas-wrap">
          <svg id="field" viewBox="0 0 1000 720" role="img" aria-label="Flag Football Play Diagram">
            <defs>
              <marker id="routeArrow" viewBox="0 0 14 14" refX="12" refY="7" markerWidth="8" markerHeight="8" orient="auto">
                <path d="M2 2 L12 7 L2 12" fill="none" stroke="#101010" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"></path>
              </marker>
              <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#111" flood-opacity=".18"></feDropShadow>
              </filter>
            </defs>
            <rect class="field-bg" x="0" y="0" width="1000" height="720"></rect>
            <g id="gridLayer"></g>
            <g id="routeHitLayer"></g>
            <g id="defenderLayer"></g>
            <g id="routeLayer"></g>
            <g id="tempLayer"></g>
            <g id="textLayer"></g>
            <g id="metaLayer"></g>
            <g id="playerLayer"></g>
          </svg>
        </div>
      </section>
    </main>
    <nav class="mobile-dock" aria-label="Mobile drawing tools">
      <button class="mobile-dock-handle" type="button" aria-label="Move tools" title="Move tools">⋮⋮</button>
      <div class="mobile-tool-row" role="group" aria-label="Tools">
        <button class="tool-button" type="button" data-tool="route" title="Route"><span class="tool-icon">➜</span><span>Route</span></button>
        <button class="tool-button" type="button" data-tool="draw" title="Draw"><span class="tool-icon">✎</span><span>Draw</span></button>
        <button class="tool-button" type="button" data-tool="motion" title="Motion"><span class="tool-icon">〰</span><span>Motion</span></button>
        <button class="tool-button" type="button" data-tool="pass" title="Pass"><span class="tool-icon">⋯</span><span>Pass</span></button>
        <button class="tool-button" type="button" data-tool="block" title="Block"><span class="tool-icon">⊣</span><span>Block</span></button>
        <button class="tool-button" type="button" data-tool="text" title="Comment"><span class="tool-icon">T</span><span>Comment</span></button>
      </div>
      <div class="mobile-line-row" role="group" aria-label="Selected line style" hidden>
        <button class="dock-action-button mobile-line-style-button" type="button" data-mobile-route-type="route" title="Solid line"><span class="tool-icon">━</span><span>Solid</span></button>
        <button class="dock-action-button mobile-line-style-button" type="button" data-mobile-route-type="motion" title="Wave line"><span class="tool-icon">〰</span><span>Wave</span></button>
        <button class="dock-action-button mobile-line-style-button" type="button" data-mobile-route-type="pass" title="Dotted line"><span class="tool-icon">⋯</span><span>Dots</span></button>
        <button class="dock-action-button mobile-line-style-button" type="button" data-mobile-end-cap="arrow" title="Arrow end"><span class="tool-icon">➜</span><span>Arrow</span></button>
        <button class="dock-action-button mobile-line-style-button" type="button" data-mobile-end-cap="t" title="T end"><span class="tool-icon">⊣</span><span>T</span></button>
        <button class="dock-action-button mobile-line-style-button" type="button" data-mobile-end-cap="dot" title="Dot end"><span class="tool-icon">●</span><span>Dot</span></button>
        <button class="dock-action-button mobile-line-style-button mobile-color-button" type="button" data-mobile-line-color="#101010" title="Black line"><span class="tool-icon color-icon" style="--line-color: #101010"></span><span>Black</span></button>
        <button class="dock-action-button mobile-line-style-button mobile-color-button" type="button" data-mobile-line-color="#e71932" title="Red line"><span class="tool-icon color-icon" style="--line-color: #e71932"></span><span>Red</span></button>
        <button class="dock-action-button mobile-line-style-button mobile-color-button" type="button" data-mobile-line-color="#2f6fed" title="Blue line"><span class="tool-icon color-icon" style="--line-color: #2f6fed"></span><span>Blue</span></button>
        <button class="dock-action-button mobile-line-style-button mobile-color-button" type="button" data-mobile-line-color="#008579" title="Green line"><span class="tool-icon color-icon" style="--line-color: #008579"></span><span>Green</span></button>
      </div>
      <div class="mobile-action-row" role="group" aria-label="Edit actions">
        <button class="tool-button is-active" type="button" data-tool="select" title="Select"><span class="tool-icon">↖</span><span>Select</span></button>
        <button class="dock-action-button mobile-undo-button" type="button" data-action="undo-history" title="Undo" aria-disabled="true"><span class="tool-icon">↶</span><span>Undo</span></button>
        <button class="dock-action-button mobile-redo-button" type="button" data-action="redo-history" title="Redo" aria-disabled="true"><span class="tool-icon">↷</span><span>Redo</span></button>
        <button class="dock-action-button danger mobile-delete-button" type="button" data-action="delete-selected" title="Delete selected line or comment" disabled><span class="tool-icon">⌫</span><span>Delete</span></button>
        <button class="dock-action-button mobile-finish-button" type="button" data-action="finish-route" title="Finish current line" disabled><span class="tool-icon">✓</span><span>Done</span></button>
        <button class="dock-action-button danger mobile-clear-button" type="button" data-action="clear-routes" title="Clear all lines" disabled><span class="tool-icon">×</span><span>Clear</span></button>
        <button class="dock-action-button" type="button" data-action="toggle-fullscreen" title="Toggle fullscreen"><span class="tool-icon">⬜</span><span>Full</span></button>
      </div>
    </nav>
    <div id="printBook" class="print-book" aria-hidden="true"></div>

    <script src="js/config.js?v=20260506-drawredo1"></script>
    <script src="js/model.js?v=20260506-drawredo1"></script>
    <script src="js/playbook-tree.js?v=20260506-drawredo1"></script>
    <script src="js/drawing.js?v=20260506-drawredo1"></script>
    <script src="js/field-interactions.js?v=20260506-drawredo1"></script>
    <script src="js/files.js?v=20260506-drawredo1"></script>
    <script src="js/playbook-actions.js?v=20260506-drawredo1"></script>
    <script src="js/main.js?v=20260506-drawredo1"></script>
  </body>
</html>
